services:

  mongo:
    image: mongo:8.2

  redis:
    image: redis:8.4

  localstack:
    image: localstack/localstack:community-archive
    ports:
      - "4566:4566"
    environment:
      - DEFAULT_REGION=eu-central-1

  workers:
    build:
      context: ..
      dockerfile: ./tests/Dockerfile
    depends_on:
      - mongo
      - redis
      - localstack
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LOCALSTACK_HOSTNAME: localstack
      S3_HOSTNAME: localstack
    command: /app/scripts/run_workers.sh

  app:
    build:
      context: ..
      dockerfile: ./tests/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis
      - localstack
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LOCALSTACK_HOSTNAME: localstack
      S3_HOSTNAME: localstack
    tty: true
    command: /bin/bash
